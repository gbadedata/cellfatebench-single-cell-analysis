name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-pipeline:
    name: Test and run benchmark pipelines
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: cellfatebench
          cache-environment: true
          cache-downloads: true

      - name: Run test suite
        shell: bash -l {0}
        run: |
          make test

      - name: Run v1 benchmark pipeline
        shell: bash -l {0}
        run: |
          make pipeline

      - name: Run v2 public RNA velocity pipeline
        shell: bash -l {0}
        run: |
          make pipeline-v2

      - name: Validate v1 expected outputs
        shell: bash -l {0}
        run: |
          test -f data/synthetic/synthetic_cell_metadata.csv
          test -f data/synthetic/synthetic_expression_matrix.csv
          test -f benchmark_tasks/public/trajectory_pseudotime_tasks.json
          test -f benchmark_tasks/public/spatial_pattern_tasks.json
          test -f benchmark_tasks/public/topological_persistence_tasks.json
          test -f benchmark_tasks/calibration_logs/design_stage_calibration_log.json
          test -f results/reports/sample_solver_score_report.json
          test -f results/tables/benchmark_task_summary.csv
          test -f results/figures/synthetic_spatial_layout.png

      - name: Validate v2 expected outputs
        shell: bash -l {0}
        run: |
          test -f results/tables/velocity_dataset_summary.csv
          test -f results/tables/velocity_layer_summary.csv
          test -f benchmark_tasks/public/velocity_reasoning_tasks.json
          test -f benchmark_tasks/hidden/velocity_reasoning_answers.json
          test -f benchmark_tasks/oracle_outputs/velocity_reasoning_oracle_outputs.json
          test -f results/tables/velocity_solver_performance_summary.csv
          test -f results/tables/velocity_task_performance_summary.csv
          test -f results/figures/velocity_solver_score_by_profile.png
          test -f results/figures/velocity_task_pass_rate.png
          test -f benchmark_tasks/calibration_logs/empirical_velocity_calibration_log.json
          test -f results/tables/velocity_task_difficulty_rebalanced.csv
          test -f results/figures/velocity_task_difficulty_rebalance.png

  docker-reproducibility:
    name: Docker reproducibility
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t cellfatebench:ci .

      - name: Run tests inside Docker
        run: |
          docker run --rm cellfatebench:ci make test

      - name: Run v1 pipeline inside Docker
        run: |
          docker run --rm cellfatebench:ci make pipeline

      - name: Run v2 pipeline inside Docker
        run: |
          docker run --rm cellfatebench:ci make pipeline-v2
